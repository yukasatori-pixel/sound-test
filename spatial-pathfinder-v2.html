<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Library - Spatial Pathfinder</title>
  <style>
    :root {
      --bg:#000; --fg:#f5f5f5; --muted:#a3a3a3; --border:#3a3a3a;
      --surface:#0e0e0e; --accent:#fff; --accent-fg:#000; --focus:#6db3ff;
    }
    * { box-sizing:border-box; }
    html, body {
      margin:0; padding:0; background:var(--bg); color:var(--fg);
      font-family:Helvetica, Arial, sans-serif; font-size:18px; line-height:1.5;
      -webkit-font-smoothing:antialiased;
    }
    body { padding:40px 20px 64px; max-width:720px; margin:0 auto; }

    .sr-only {
      position:absolute; width:1px; height:1px; padding:0; margin:-1px;
      overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
    }
    a.skip-link {
      position:absolute; left:-999px; top:0;
      background:var(--fg); color:var(--bg); padding:8px 12px; z-index:100;
    }
    a.skip-link:focus { left:8px; top:8px; }

    h2.section-heading { font-size:19px; font-weight:bold; letter-spacing:.01em; margin:0 0 20px; }
    h3.sub-heading {
      font-size:14px; font-weight:bold; text-transform:uppercase;
      letter-spacing:.08em; margin:0 0 8px; color:var(--muted);
    }
    .stack { display:flex; flex-direction:column; gap:14px; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    @media (max-width:480px){ .grid-2 { grid-template-columns:1fr; } }

    button {
      font-family:Helvetica, Arial, sans-serif; font-size:17px; color:var(--fg);
      background:var(--surface); border:1px solid var(--border); padding:16px 18px;
      text-align:left; cursor:pointer; width:100%; line-height:1.4;
      transition:background .15s ease, border-color .15s ease;
    }
    button:hover { background:#1a1a1a; border-color:#555; }
    button:focus-visible, button:focus { outline:2px solid var(--focus); outline-offset:2px; }
    button[disabled] { opacity:.35; cursor:not-allowed; }

    button.tile {
      aspect-ratio:1/1; display:flex; flex-direction:column;
      align-items:flex-start; justify-content:flex-end; padding:20px;
      font-size:18px; font-weight:bold;
    }
    button.tile .tile-sub {
      display:block; font-size:12px; font-weight:normal; text-transform:uppercase;
      letter-spacing:.08em; color:var(--muted); margin-top:6px;
    }
    @media (max-width:480px){ button.tile { aspect-ratio:auto; min-height:96px; } }

    button.primary {
      background:var(--accent); color:var(--accent-fg); border-color:var(--accent);
      text-align:center; font-weight:bold;
    }
    button.primary:hover { background:#dcdcdc; border-color:#dcdcdc; }
    button.center { text-align:center; }

    .btn-sub { display:block; font-size:13px; color:var(--muted); margin-top:4px; }
    button.primary .btn-sub { color:#333; }

    .book-card { border:1px solid var(--border); background:var(--surface); padding:18px; margin-bottom:18px; }
    .book-card .label { font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:0 0 6px; }
    .book-card h2 { font-size:22px; margin:0 0 4px; }
    .book-card .author { font-size:16px; color:var(--muted); margin:0; }

    p.summary { font-size:17px; margin:0 0 18px; }
    .detail-box { border:1px solid var(--border); background:var(--surface); padding:14px; font-size:16px; }
    .row { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:10px; }
    .pos-indicator { font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin:0 0 14px; }
    section.block { border-top:1px solid var(--border); padding-top:18px; margin-top:18px; }

    .modal-backdrop {
      position:fixed; inset:0; background:rgba(0,0,0,.7);
      display:flex; align-items:center; justify-content:center; padding:16px;
    }
    .modal-backdrop.hidden { display:none; }
    .modal {
      background:var(--bg); border:1px solid var(--border); padding:22px;
      max-width:480px; width:100%; max-height:90vh; overflow-y:auto;
    }
    .modal h2 { font-size:20px; margin:0 0 18px; padding-bottom:12px; border-bottom:1px solid var(--border); }

    #fatal-error {
      display:none; border:1px solid #b00; background:#1a0000; color:#ff8a8a;
      padding:14px; margin-bottom:18px; font-size:14px; white-space:pre-wrap; border-radius:6px;
    }
  </style>
</head>
<body>

  <a href="#dynamic-stage" class="skip-link">Skip to main content</a>

  <!-- Screen reader live region -->
  <div id="accessibility-announcer" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

  <!-- Visible error surface (only shows if something throws) -->
  <div id="fatal-error" role="alert"></div>

  <!-- Persistent audio element (reused for all playback; needed for iOS Safari) -->
  <audio id="book-audio" loop preload="auto" playsinline></audio>

  <!-- Main content -->
  <main id="dynamic-stage" tabindex="-1"></main>

  <!-- Travel menu trigger -->
  <div style="margin-top:28px;">
    <button class="primary" onclick="openTravelMenu()" aria-haspopup="dialog">
      Open Travel Options Menu
    </button>
  </div>

  <!-- Travel modal -->
  <div id="travel-modal-backdrop" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-label="Travel Options Menu">
    <div class="modal">
      <h2>Travel Options Menu</h2>
      <div class="stack">
        <button id="btn-travel-back" onclick="travelBack()">
          Back to previous location
          <span class="btn-sub">Step one location backward</span>
        </button>
        <button id="btn-travel-beginning" onclick="travelBeginning()">
          Go to beginning of this corridor
          <span class="btn-sub">Return to the first door on this floor</span>
        </button>
        <button onclick="travelMainHall()">
          Go to the Main Hall
          <span class="btn-sub">Reset and start over from the four wings</span>
        </button>
        <button class="center" onclick="closeTravelMenu()">Close Menu</button>
      </div>
    </div>
  </div>

  <script>
  (function () {
    "use strict";

    // Surface any uncaught error on screen so failures are never silent.
    function showFatal(msg) {
      var box = document.getElementById('fatal-error');
      if (box) { box.style.display = 'block'; box.textContent = 'Error: ' + msg; }
    }
    window.addEventListener('error', function (e) {
      showFatal((e && e.message ? e.message : 'unknown') + (e && e.filename ? ' @ ' + e.lineno : ''));
    });

    // ── DATA ────────────────────────────────────────────────────────────────
    var BOOKS = {
      1:  { id:1,  title:'Anxious People',               author:'Fredrik Backman',     summary:"An incompetent bank robber takes a group of high-maintenance apartment viewers hostage, forcing a hilarious and heartwarming clash of personalities on New Year's Eve.", detailedSummary:"Anna-Lena and Roger are busy buying up apartments to fill a void in their marriage. Julia and Ro are panicky parents-to-be filled with anxiety. Lonely bank manager Zara only visited the open viewing for the high-rise view. Estelle, an 87-year-old grandmother, is surprisingly pleasant and welcoming of the hostage takers' presence. As the police surround the building, these complete strangers find themselves sharing deep bonds of shared human flaws, demonstrating that we are all just doing the best we can in an incredibly anxious world.", musicUrl:"https://cdn.jsdelivr.net/gh/yukasatori-pixel/sound-test@main/Anxious%20people.mp3" },
      2:  { id:2,  title:'Verity',                       author:'Colleen Hoover',      summary:"A struggling writer is hired to complete the remaining books of a highly successful series by an injured author, only to uncover a terrifying, hidden autobiography.", detailedSummary:"Lowen Ashleigh accepts the writing offer of a lifetime from Jeremy Crawford, husband of elite suspense novelist Verity Crawford. Staying at their home to review Verity's chaotic study notes, Lowen discovers an unpromoted, chilling manuscript detailing bone-chilling confessions about Verity's dark psyche and the tragic deaths of their daughters. Struggling with her fast-growing attraction to Jeremy, Lowen must decide whether to expose the horrific pages, uncertain of what is manipulative fiction and what is the devastating truth.", musicUrl:null },
      3:  { id:3,  title:'The Key Lime Garden Inn',      author:'Annie Cabot',         summary:"Maggie Wheeler flees her betrayed life to restore a historic, secret-filled inn on Captiva Island, Florida, discovering unexpected second chances.", detailedSummary:"Maggie's perfect Massachusetts lifestyle turns upside down when her husband's sudden death exposes layers of financial betrayal. Running away to coastal Captiva Island, she befriends Rose Johnson Lane, whose old family estate harbors decades of mystery. After Rose passes, Maggie inherits the run-down historic Key Lime Garden Inn, sparking a journey of architectural renovation, sisterhood, and the beautiful, hard-won courage required to start fresh and bloom after catastrophic losses.", musicUrl:null },
      4:  { id:4,  title:'A Little Bit Of Sunshine',     author:'Nick Alexander',      summary:"Two sisters spend ten days on a remote Greek island, where blazing sun and old resentments crack open their glossy facades.", detailedSummary:"Dee lives a quiet, rainy life in Salford, completely contrasting her sister Trina's lavish champagne-fueled glamorous lifestyle. Under the blazing sun of a secluded Aegean paradise, long-simmering sibling rivalries and deep-seated envies start to boil. Facilitated by a handsome host and pressurized under the dry heat of Greece, the sisters must confront the painful personal truths, dark secrets, and high psychological costs of holding onto empty, competitive appearances.", musicUrl:null },
      5:  { id:5,  title:'Beginning to Live',            author:'Emmy van Deurzen',    summary:"A philosopher and therapist's guide to life's practical challenges, examining our experience across physical, social, personal, and spiritual dimensions.", detailedSummary:"Emmy van Deurzen offers an elegant blueprint for navigating existence by framing human struggle through the structured lens of existential philosophy. Instead of avoiding distress, readers are invited to embrace adversity as an active, beautiful challenge. By examining life's four key dimensions, the book provides useful frameworks to reclaim autonomy, reconstruct purpose, and perceive the future not as an unpredictable threat, but as a masterpiece in active development.", musicUrl:null },
      6:  { id:6,  title:'Thirst',                       author:'John Robins',         summary:"Taskmaster champion and broadcaster John Robins chronicles his struggle with alcoholism and his moving journey toward clean sobriety with humor.", detailedSummary:"Written with painful, exquisite honesty, John Robins walks through his relationship with alcohol from his earliest adolescent drinks to his absolute bottom and eventual recovery in 2022. Balancing devastating truths of addiction with the dark humor of a master comedian, the narrative serves both as a warning beacon for those in similar struggles and a celebration of human resilience, self-forgiveness, and the healing clarity of a sober mind.", musicUrl:null },
      7:  { id:7,  title:'Land',                         author:"Maggie O'Farrell",    summary:"In 1865 Ireland, a father and son work on an ambitious Ordnance Survey mapping project, only to be redirected by an unsettling woodland encounter.", detailedSummary:"Tomas and his quiet, reluctant son Liam are tasked with precision mapping the Irish coastline when events take a strange spiritual turn. Deep within the ancient, windswept Irish peninsula, Maggie O'Farrell weaves a rich historical tapestry of buried family treasures, persistent spectral encounters, a remarkably loyal hound, and a lyrical meditation on how we claim land, draft borders, and realize that nothing in history truly stays buried.", musicUrl:null },
      8:  { id:8,  title:'House of Earth and Blood',     author:'Sarah J. Maas',       summary:"A high-octane fantasy where half-fae Bryce Quinlan and fallen angel Hunt Athalar team up to solve a series of brutal murders shaking Lunathion.", detailedSummary:"Bryce Quinlan loved the party scenes of Crescent City until a demon massacre robbed her of her closest friends. Two years later, the killer strikes again, forcing her into an alliance with the enslaved, infamous assassin angel Hunt Athalar. Together, they plunge into the city's deepest criminal underworld, discovering terrifying conspiracies, forbidden magic, and ancient forces that threaten every citizen, all while fighting their own growing, explosive chemistry.", musicUrl:null },
      9:  { id:9,  title:'Binding 13',                   author:'Chloe Walsh',         summary:"An emotional, slow-burn Irish romance focusing on a star rugby player and a traumatized new student whose worlds collide mid-semester.", detailedSummary:"Johnny Kavanagh is a local celebrity at Tommen College, focused purely on reaching the rugby big leagues, despite a looming injury. Shannon Lynch is a quiet, bullied transfer student hoping to escape severe domestic trauma and panic issues. Drawn together through accidental encounters, they form a protective, deeply complicated bond. This heavy contemporary drama explores the long, hard road to healing, the power of young love, and the strength it takes to break toxic cycles.", musicUrl:null },
      10: { id:10, title:'You Are Here',                 author:'David Nicholls',      summary:"Two lonely, driftless souls are brought together on an epic walk across the English countryside during persistent, gray rainfall.", detailedSummary:"Marnie is stuck in her solitary London flat, work-stressed and repeating identical days. Michael is coming undone, taking longer and longer solitary walks through nature to escape his broken marriage. When a mutual friend orchestrates a group hike, these two strangers find themselves walking side-by-side. Across moors and through driving storms, their shared physical struggle builds a quiet, humorous, and tender connection, proving that losing oneself is often the only way to be found.", musicUrl:null },
      11: { id:11, title:'Funny Story',                  author:'Emily Henry',         summary:"Daphne strikes up an unlikely roommate arrangement with her ex-fiance's new fiancee's ex-boyfriend Miles in a bid for self-preservation.", detailedSummary:"Left stranded in Michigan after Peter declares his love for childhood best friend Petra, library assistant Daphne finds herself stranded with the only person who can share her unique sorrow: Miles, Petra's chaotic ex. To survive, they agree to share an apartment, drawing strict lines. But when they decide to post fake photos to make their exes jealous, they embark on a summer of discovery that threatens to permanently rewrite Daphne's carefully plotted future chapters.", musicUrl:null },
      12: { id:12, title:"The Violin Maker's Secret",    author:'Evie Woods',          summary:"Three complete strangers at Heathrow Airport are united by a rare, forgotten violin that alters the course of their lives.", detailedSummary:"Devlin is a baggage handler with a heavy heart. Walter is a retired history teacher missing his departed partner, and Gabrielle is a gifted instrument appraiser on the run from her past. When an exquisitely crafted 18th-century violin appears in the airport's unclaimed luggage, the trio is swept into a century-old mystery spanning war-torn Europe. To solve the secret of the instrument's hidden drawers, they must first find the courage to share their own deep-seated secrets and start living again.", musicUrl:null },
      13: { id:13, title:'Taming Mr. Walker',            author:'Rosa Lucas',          summary:"An intense, corporate romance between a quiet employee and her brother's powerful, arrogant tech tycoon best friend.", detailedSummary:"Danny Walker rejected my teenage advances flat out, leaving me embarrassed and distant. Eight years later, he buys out the massive tech firm where I work, making him the ultimate boss. Danny is hard-edged, calculated, and holds the room with cold command presence. But as our direct roles overlap, the freezing professional exterior begins to melt, exposing a fiery passion, long-concealed vulnerabilities, and an intense personal fire that has been burning for years.", musicUrl:null },
      14: { id:14, title:'The Hand That First Held Mine',author:"Maggie O'Farrell",    summary:"Two passionate women living in Soho during the 1950s and modern London are bound across generations by a legacy of art, motherhood, and secrets.", detailedSummary:"Lexie Sinclair leaves rural Devon behind to find her fortune in London's bohemian mid-century Soho alongside the sophisticated Innes Kent. Fifty years later, Elina and Ted struggle to regain their grounding after the near-fatal birth of their first newborn. As Ted's childhood memories fragment and swirl, a web of coincidences pieces together a gorgeous, tear-jerking portrait showing how love, loss, and the indomitable female spirit can survive across generations.", musicUrl:null },
      15: { id:15, title:'Project Hail Mary',            author:'Andy Weir',           summary:"A lone astronaut wakes up with severe amnesia on a desperate starship mission to save Earth from a solar-eating microbial disaster.", detailedSummary:"Ryland Grace is the sole survivor of a final, last-ditch global mission. As his memory slowly pieces back together, he realizes the magnitude of his task: finding a cure for the Astrophage heating up the Sun, with only two deceased crewmates for company. Plunged millions of miles into deep space, he is forced to rely on scientific deduction, creative physics, and a mind-blowing, heart-wrenching alliance with an extraordinary extraterrestrial engineer.", musicUrl:null },
      16: { id:16, title:'Dear Debbie',                  author:'Freida McFadden',     summary:"A popular advice columnist decides it is finally time to seek hilarious, calculated payback on the personal family members ruining her life.", detailedSummary:"Debbie Mullen has spent decades handing out perfectly measured, calm advice to anxious suburban families. But when her own life collapses, losing her syndicated column, finding her teenage kids in trouble, and discovering her husband is hiding a secret bank account, she stops trying to be the bigger person. Following her own rules, we watch Debbie embark on a series of elaborate, delightfully dramatic vengeful schemes to reclaim her home and sanity.", musicUrl:null },
      17: { id:17, title:'When The Cranes Fly South',    author:'Lisa Ridzen',         summary:"An elderly Swedish farmer fights to keep his beloved dog and his dignity, even as his son pushes to place him in a care home.", detailedSummary:"Bo lives on his small, quiet ancestral farm in northern Sweden, assisted by an active local visiting nurse team. His days are kept bright by his loyal dog Sixten, calls with his oldest friend, and beautiful memories of his late wife. However, his son's increasing insistence on taking Sixten away for safety triggers a profound emotional awakening, leading Bo to mount a quiet, stubborn rebellion to preserve his way of life.", musicUrl:null },
      18: { id:18, title:'Broken Country',               author:'Clare Leslie Hall',   summary:"A high-stakes, lyrical thriller following a young woman viewing her first love stand trial for a shocking murder in an English village.", detailedSummary:"Beth first met Gabriel during a golden, intoxicating summer that redefined her artistic horizons. Ten years after his sudden, painful departure, Gabriel returns to their quiet village, upending the stable life Beth built for herself. Told through structural dual timelines, the dark suspense moves between that unforgettable first summer and the modern courtroom, building tension about what happened on the fateful night of the murder.", musicUrl:null },
      19: { id:19, title:'Before the Coffee Gets Cold',  author:'Toshikazu Kawaguchi',summary:"In a quiet, subterranean Tokyo cafe, customers are offered the rare chance to travel back in time, but they must return before their coffee gets cold.", detailedSummary:"To travel back in time, visitors must sit in a specific, legendary chair and accept strict rules: they can only meet people who have visited the cafe, they cannot alter the present, and most importantly, they must drink all their coffee before it gets cold. These beautifully crafted stories follow several visitors seeking to resolve past departures, letters, and relationships, learning that while memory cannot modify the past, it remains a powerful guide for how they live tomorrow.", musicUrl:null },
      20: { id:20, title:'Normal People',                author:'Sally Rooney',        summary:"A poignant, razor-sharp dissection of class, intimacy, and the complicated bonds between two youths moving from school to university.", detailedSummary:"Connell is a popular rugby player whose mother works as a housekeeper for Marianne, a wealthy, deeply isolated loner. When they share a private conversation, they spark a secretive romantic connection that they hide from their school. As they shift to Trinity College Dublin, their social standings invert, but their mutual gravitational pull endures. Sally Rooney's masterpiece explores how one person can completely redefine another's life.", musicUrl:null },
      21: { id:21, title:'The Dinner Party',             author:'Freida McFadden',     summary:"Desperate for rent money, a waitress accepts a highly paid, extremely suspicious shift at an isolated mansion on Peyton's Peak.", detailedSummary:"Eviction is only days away when a wealthy, eccentric friend offers the narrator double pay to waitress during an exclusive, highly private dinner party. Located in a sprawling, historic mountain estate where she has no cell coverage, the guests' bizarre social behaviors and the host's dark, locked doors trigger mounting paranoia. In a playful twist on classic thriller choices, the guide gives you direct power to choose your own path.", musicUrl:null }
    };

    var SPATIAL_METRIC_MAP = {
      'North Wing (Fiction)': {
        'Top Floor (Trending & New Releases)': [11, 2, 9, 1],
        'Middle Floor (Standard Catalog)':     [3, 4, 10, 12, 13],
        'Basement (Surprise & Deep Cuts)':     [14, 18, 21]
      },
      'South Wing (Lifestyle)': {
        'Top Floor (Trending & New Releases)': [6],
        'Middle Floor (Standard Catalog)':     [5],
        'Basement (Surprise & Deep Cuts)':     [19]
      },
      'West Wing (Science)': {
        'Top Floor (Trending & New Releases)': [15],
        'Middle Floor (Standard Catalog)':     [7],
        'Basement (Surprise & Deep Cuts)':     [8]
      },
      'East Wing (Society)': {
        'Top Floor (Trending & New Releases)': [20],
        'Middle Floor (Standard Catalog)':     [17],
        'Basement (Surprise & Deep Cuts)':     [16]
      }
    };

    // ── STATE ───────────────────────────────────────────────────────────────
    var state = {
      screen:'main_hall', currentWing:null, currentFloor:null,
      currentBooks:[], currentIndex:0, bookId:null,
      readBooks:[], favorites:[], history:[], showDetailed:false,
      activeAudioBookId:null, audioState:'stopped'
    };

    // ── AUDIO (single persistent element, iOS-friendly) ───────────────────────
    function getAudioEl(){ return document.getElementById('book-audio'); }

    function stopAudio(){
      var el = getAudioEl();
      if (el) { try { el.pause(); } catch(e){} }
      state.activeAudioBookId = null;
      state.audioState = 'stopped';
    }

    function toggleBookAudio(bookId){
      if (state.activeAudioBookId === bookId && state.audioState !== 'stopped'){
        stopAudio(); announce('Audio stopped.'); render(); return;
      }
      stopAudio();
      var book = BOOKS[bookId];
      if (!book) return;
      if (!book.musicUrl){ announce('No audio is available for ' + book.title + '.'); return; }

      var el = getAudioEl();
      if (!el) return;

      state.activeAudioBookId = bookId;
      state.audioState = 'loading';
      render();
      announce('Loading audio for ' + book.title + '. Please wait a moment.');

      var announced = false;
      el.onplaying = function(){
        if (announced || state.activeAudioBookId !== bookId) return;
        announced = true;
        state.audioState = 'playing';
        render();
        announce('Now playing music for ' + book.title + '.');
      };
      el.onerror = function(){
        if (state.activeAudioBookId !== bookId) return;
        stopAudio(); render();
        announce('Sorry, the audio for ' + book.title + ' could not be played.');
      };

      el.volume = 0.85;
      el.src = book.musicUrl;
      el.load();
      var p = el.play();
      if (p && typeof p.catch === 'function'){
        p.catch(function(){
          if (state.activeAudioBookId !== bookId) return;
          stopAudio(); render();
          announce('Sorry, the audio for ' + book.title + ' could not be played.');
        });
      }
    }

    // ── ACCESSIBILITY ────────────────────────────────────────────────────────
    function announce(msg){
      var el = document.getElementById('accessibility-announcer');
      if (!el) return;
      el.textContent = '';
      setTimeout(function(){ el.textContent = msg; }, 50);
    }
    function focusStage(){
      var heading = document.querySelector('#dynamic-stage h2');
      var target = heading || document.getElementById('dynamic-stage');
      if (target){
        if (target.id !== 'dynamic-stage' && !target.hasAttribute('tabindex')) target.setAttribute('tabindex','-1');
        try { target.focus(); } catch(e){}
      }
    }

    // ── HISTORY ──────────────────────────────────────────────────────────────
    function pushHistory(){
      state.history.push({
        screen:state.screen, currentWing:state.currentWing, currentFloor:state.currentFloor,
        currentBooks:state.currentBooks.slice(), currentIndex:state.currentIndex, bookId:state.bookId
      });
    }
    function initHistory(){
      state.history = [{ screen:'main_hall', currentWing:null, currentFloor:null, currentBooks:[], currentIndex:0, bookId:null }];
    }

    // ── NAVIGATION ───────────────────────────────────────────────────────────
    function selectWing(wingName){
      state.screen='floor_select'; state.currentWing=wingName; state.currentFloor=null;
      state.currentBooks=[]; state.currentIndex=0; state.bookId=null;
      pushHistory(); render();
      announce('You entered the ' + wingName + '. Choose a floor: Top Floor for Trending and New Releases, Middle Floor for Standard Catalog, or Basement for Surprise and Deep Cuts.');
      focusStage();
    }
    function selectFloor(floorName){
      var booksList = (SPATIAL_METRIC_MAP[state.currentWing] || {})[floorName] || [];
      state.screen='corridor'; state.currentFloor=floorName; state.currentBooks=booksList;
      state.currentIndex=0; state.bookId=null;
      pushHistory(); render();
      var first = booksList[0] ? BOOKS[booksList[0]] : null;
      announce('Entered ' + floorName + ' of ' + state.currentWing + '. ' + booksList.length + ' doors on this floor.' + (first ? ' First door: ' + first.title + ' by ' + first.author + '.' : ''));
      focusStage();
    }
    function skipDoor(){
      var nextIndex = state.currentIndex + 1;
      if (nextIndex >= state.currentBooks.length){
        state.screen='end_corridor'; pushHistory(); render();
        announce('You have reached the end of this corridor.');
      } else {
        state.currentIndex = nextIndex; pushHistory(); render();
        var book = BOOKS[state.currentBooks[state.currentIndex]];
        announce('Door ' + (state.currentIndex + 1) + ' of ' + state.currentBooks.length + '. ' + (book ? book.title + ' by ' + book.author : '') + '.');
      }
      focusStage();
    }
    function knockDoor(id){
      if (state.readBooks.indexOf(id) === -1) state.readBooks.push(id);
      state.screen='room'; state.bookId=id; state.showDetailed=false;
      pushHistory(); render();
      var b = BOOKS[id];
      announce('Opened the door details for ' + (b ? b.title + ' by ' + b.author : 'unknown') + '.');
      focusStage();
    }
    function returnToCorridor(){
      state.screen='corridor'; state.bookId=null; pushHistory(); render();
      announce('Returned to the corridor.'); focusStage();
    }
    function goThrough(id){
      state.screen='through'; state.bookId=id; pushHistory(); render();
      announce('Three related paths appear: Readers also viewed, More in this style, and Related works.');
      focusStage();
    }
    function branchToCorridor(categoryName){
      var lists = { Similar:[2,21,11,9,20], Style:[14,7,16,21,19], Related:[15,8,5,6,18] };
      var booksList = lists[categoryName] || [];
      state.screen='corridor'; state.currentWing='Related Doors'; state.currentFloor=categoryName;
      state.currentBooks=booksList; state.currentIndex=0; state.bookId=null;
      pushHistory(); render();
      var first = BOOKS[booksList[0]];
      announce('Now in the ' + categoryName + ' path. ' + booksList.length + ' doors.' + (first ? ' First: ' + first.title : '') + '.');
      focusStage();
    }

    // ── FAVORITES / ACTIONS ───────────────────────────────────────────────────
    function toggleFavorite(bookId){
      var idx = state.favorites.indexOf(bookId);
      if (idx > -1){ state.favorites.splice(idx,1); announce('Removed ' + (BOOKS[bookId]?BOOKS[bookId].title:'') + ' from favorites.'); }
      else { state.favorites.push(bookId); announce('Added ' + (BOOKS[bookId]?BOOKS[bookId].title:'') + ' to favorites.'); }
      render();
    }
    function startReading(bookId){ announce('Enjoy reading ' + (BOOKS[bookId]?BOOKS[bookId].title:'') + '.'); }
    function exploreRandom(){
      var wings = Object.keys(SPATIAL_METRIC_MAP);
      var randomWing = wings[Math.floor(Math.random()*wings.length)];
      var floors = Object.keys(SPATIAL_METRIC_MAP[randomWing]);
      var randomFloor = floors[Math.floor(Math.random()*floors.length)];
      state.currentWing = randomWing; selectFloor(randomFloor);
    }

    // ── TRAVEL MODAL ──────────────────────────────────────────────────────────
    var lastFocusedBeforeModal = null;
    function openTravelMenu(){
      lastFocusedBeforeModal = document.activeElement;
      document.getElementById('travel-modal-backdrop').classList.remove('hidden');
      var backBtn = document.getElementById('btn-travel-back');
      if (state.history.length <= 1) backBtn.setAttribute('disabled','true'); else backBtn.removeAttribute('disabled');
      var beginBtn = document.getElementById('btn-travel-beginning');
      var inCorridor = state.screen==='corridor' || state.screen==='room' || state.screen==='end_corridor';
      if (!inCorridor) beginBtn.setAttribute('disabled','true'); else beginBtn.removeAttribute('disabled');
      announce('Travel Options Menu opened.');
      var firstEnabled = backBtn.hasAttribute('disabled')
        ? (beginBtn.hasAttribute('disabled') ? document.querySelector('#travel-modal-backdrop button:not([disabled])') : beginBtn)
        : backBtn;
      if (firstEnabled){ try { firstEnabled.focus(); } catch(e){} }
    }
    function closeTravelMenu(){
      document.getElementById('travel-modal-backdrop').classList.add('hidden');
      if (lastFocusedBeforeModal){ try { lastFocusedBeforeModal.focus(); } catch(e){} }
    }
    function travelBack(){
      if (state.history.length > 1){
        state.history.pop();
        var prev = state.history[state.history.length - 1];
        state.screen=prev.screen; state.currentWing=prev.currentWing; state.currentFloor=prev.currentFloor;
        state.currentBooks=prev.currentBooks.slice(); state.currentIndex=prev.currentIndex; state.bookId=prev.bookId;
        closeTravelMenu(); render(); announce('Returned to previous location.'); focusStage();
      }
    }
    function travelBeginning(){
      var inCorridor = state.screen==='corridor' || state.screen==='room' || state.screen==='end_corridor';
      if (inCorridor){
        state.currentIndex=0; state.bookId=null; state.screen='corridor';
        pushHistory(); closeTravelMenu(); render();
        var first = BOOKS[state.currentBooks[0]];
        announce('Returned to start of corridor. First door: ' + (first ? first.title : '') + '.');
        focusStage();
      }
    }
    function travelMainHall(){
      stopAudio();
      state.screen='main_hall'; state.currentWing=null; state.currentFloor=null;
      state.currentBooks=[]; state.currentIndex=0; state.bookId=null;
      initHistory(); closeTravelMenu(); render();
      announce('Returned to the Main Hall. Choose any of the 4 wings to explore.');
      focusStage();
    }

    // ── ACCORDION ─────────────────────────────────────────────────────────────
    function toggleDetailedAccordion(){
      state.showDetailed = !state.showDetailed; render();
      announce(state.showDetailed ? 'Detailed summary expanded.' : 'Detailed summary collapsed.');
    }

    // ── HELPERS ───────────────────────────────────────────────────────────────
    function esc(str){
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // ── RENDER ────────────────────────────────────────────────────────────────
    function render(){
      var stage = document.getElementById('dynamic-stage');
      if (!stage) return;
      var html = '';

      if (state.screen === 'main_hall'){
        var wings = [
          ['North Wing (Fiction)','North Wing','Fiction'],
          ['South Wing (Lifestyle)','South Wing','Lifestyle'],
          ['West Wing (Science)','West Wing','Science'],
          ['East Wing (Society)','East Wing','Society']
        ];
        html = '<h2 class="section-heading">Main Hall: choose a wing</h2>' +
          '<div class="grid-2">' +
          wings.map(function(w){
            return '<button class="tile" onclick="selectWing(\'' + esc(w[0]) + '\')" aria-label="' + esc(w[1] + ', ' + w[2]) + '">' +
              esc(w[2]) + '<span class="tile-sub">' + esc(w[1]) + '</span></button>';
          }).join('') + '</div>';

      } else if (state.screen === 'floor_select'){
        var floors = ['Top Floor (Trending & New Releases)','Middle Floor (Standard Catalog)','Basement (Surprise & Deep Cuts)'];
        html = '<h2 class="section-heading">' + esc(state.currentWing) + ': choose a floor</h2>' +
          '<div class="stack">' +
          floors.map(function(f){ return '<button onclick="selectFloor(\'' + esc(f) + '\')">' + esc(f) + '</button>'; }).join('') +
          '</div>';

      } else if (state.screen === 'corridor'){
        var bookId = state.currentBooks[state.currentIndex];
        var book = BOOKS[bookId];
        var isCurrent = state.activeAudioBookId === bookId;
        var isPlaying = isCurrent && state.audioState === 'playing';
        var isLoading = isCurrent && state.audioState === 'loading';
        var hasAudio = !!(book && book.musicUrl);
        var audioLabel = !hasAudio ? 'No audio available for this door'
          : isLoading ? 'Loading audio, please wait'
          : isPlaying ? 'Stop audio' : 'Play audio for this door';

        html = '<h2 class="section-heading">Corridor</h2>' +
          '<div class="book-card">' +
          '<p class="label">Current door</p>' +
          '<h2 style="font-size:22px;">' + esc(book.title) + '</h2>' +
          '<p class="author">by ' + esc(book.author) + '</p>' +
          '</div>' +
          '<div class="stack">' +
          '<button onclick="toggleBookAudio(' + bookId + ')" aria-pressed="' + isPlaying + '"' + (hasAudio ? '' : ' disabled') + '>' + esc(audioLabel) + '</button>' +
          '<button onclick="knockDoor(' + bookId + ')">Open this door to view details</button>' +
          '<button class="primary" onclick="skipDoor()">Skip to next door</button>' +
          '</div>' +
          '<p class="pos-indicator" style="margin:18px 0 0;">Corridor — Door ' + (state.currentIndex + 1) + ' of ' + state.currentBooks.length + '</p>';

      } else if (state.screen === 'room'){
        var rid = state.bookId;
        var rbook = BOOKS[rid];
        var isFav = state.favorites.indexOf(rid) > -1;
        html = '<h2 class="section-heading sr-only">Door details</h2>' +
          '<div class="book-card">' +
          '<p class="label">Now viewing</p>' +
          '<h2 style="font-size:22px;">' + esc(rbook.title) + '</h2>' +
          '<p class="author">by ' + esc(rbook.author) + '</p>' +
          '</div>' +
          '<section><h3 class="sub-heading">Short summary</h3>' +
          '<p class="summary">' + esc(rbook.summary) + '</p></section>' +
          '<section class="block">' +
          '<div class="row">' +
          '<h3 class="sub-heading" style="margin:0;">Detailed summary</h3>' +
          '<button onclick="toggleDetailedAccordion()" aria-expanded="' + state.showDetailed + '" style="width:auto;font-size:14px;padding:8px 14px;">' +
          (state.showDetailed ? 'Hide details' : 'Show details') + '</button>' +
          '</div>' +
          (state.showDetailed
            ? '<div class="detail-box">' + esc(rbook.detailedSummary) + '</div>'
            : '<p style="font-size:14px;color:var(--muted);margin:0;">Details hidden. Press Show details to read more.</p>') +
          '</section>' +
          '<section class="block">' +
          '<h3 class="sub-heading">Actions</h3>' +
          '<div class="stack">' +
          '<button onclick="startReading(' + rid + ')">Start reading</button>' +
          '<button onclick="toggleFavorite(' + rid + ')" aria-pressed="' + isFav + '">' +
          (isFav ? 'Remove from favorites' : 'Add to favorites') + '</button>' +
          '<button class="primary" onclick="goThrough(' + rid + ')">Find related doors</button>' +
          '<button onclick="returnToCorridor()">Return to corridor</button>' +
          '</div></section>';

      } else if (state.screen === 'through'){
        var doors = [['Similar','Readers also viewed'],['Style','More in this style'],['Related','Related works']];
        html = '<h2 class="section-heading">Choose a related path</h2>' +
          '<div class="stack">' +
          doors.map(function(d){ return '<button onclick="branchToCorridor(\'' + esc(d[0]) + '\')">' + esc(d[1]) + '</button>'; }).join('') +
          '</div>';

      } else if (state.screen === 'end_corridor'){
        html = '<h2 class="section-heading">End of corridor</h2>' +
          '<p class="summary">You have browsed every door on this path. Return to the Main Hall or explore a random corridor.</p>' +
          '<div class="stack">' +
          '<button class="primary" onclick="travelMainHall()">Return to Main Hall</button>' +
          '<button onclick="exploreRandom()">Explore a random corridor</button>' +
          '</div>';
      }

      stage.innerHTML = html;
    }

    // ── EXPOSE handlers used by inline onclick ────────────────────────────────
    window.selectWing = selectWing;
    window.selectFloor = selectFloor;
    window.skipDoor = skipDoor;
    window.knockDoor = knockDoor;
    window.returnToCorridor = returnToCorridor;
    window.goThrough = goThrough;
    window.branchToCorridor = branchToCorridor;
    window.toggleFavorite = toggleFavorite;
    window.startReading = startReading;
    window.exploreRandom = exploreRandom;
    window.toggleBookAudio = toggleBookAudio;
    window.toggleDetailedAccordion = toggleDetailedAccordion;
    window.openTravelMenu = openTravelMenu;
    window.closeTravelMenu = closeTravelMenu;
    window.travelBack = travelBack;
    window.travelBeginning = travelBeginning;
    window.travelMainHall = travelMainHall;

    // ── KEYBOARD: close modal on Escape ───────────────────────────────────────
    document.addEventListener('keydown', function(e){
      if (e.key === 'Escape'){
        var modal = document.getElementById('travel-modal-backdrop');
        if (modal && !modal.classList.contains('hidden')) closeTravelMenu();
      }
    });

    // ── BOOT (runs immediately; script is at end of body) ─────────────────────
    try {
      initHistory();
      render();
      var guideKey = 'spatial_guide_seen';
      var seen = false;
      try { seen = !!localStorage.getItem(guideKey); } catch(e){}
      if (!seen){
        announce('Welcome to the Digital Library. You are in the Main Hall. Four wings surround you: North Wing for Fiction, South Wing for Lifestyle, West Wing for Science, and East Wing for Society. Select a wing to begin.');
        try { localStorage.setItem(guideKey,'true'); } catch(e){}
      } else {
        announce('You are in the Main Hall. Choose any of the 4 wings to explore.');
      }
    } catch (err) {
      showFatal(err && err.message ? err.message : String(err));
    }
  })();
  </script>
</body>
</html>
